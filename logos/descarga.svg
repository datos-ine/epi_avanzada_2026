<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo blanco -->
  <rect width="100%" height="100%" fill="white"></rect>

  <!-- Hexágono -->
  <polygon points="400,50 700,225 700,575 400,750 100,575 100,225" fill="white" stroke="#0B2A4A" stroke-width="12"></polygon>

  <!-- Hexágono interno -->
  <polygon points="400,90 660,245 660,555 400,710 140,555 140,245" fill="white" stroke="#0B2A4A" stroke-width="4"></polygon>

  <!-- Íconos superiores simplificados -->
  <!-- Mapa (placeholder estilizado) -->
  <circle cx="400" cy="230" r="80" fill="#E6EEF5"></circle>

  <!-- Personas -->
  <circle cx="400" cy="320" r="20" fill="#0B2A4A"></circle>
  <circle cx="360" cy="330" r="12" fill="#4A6A8A"></circle>
  <circle cx="440" cy="330" r="12" fill="#4A6A8A"></circle>

  <!-- Lupa -->
  <circle cx="220" cy="300" r="40" stroke="#0B2A4A" stroke-width="5" fill="none"></circle>
  <line x1="250" y1="330" x2="280" y2="360" stroke="#0B2A4A" stroke-width="5"></line>

  <!-- Gráfico -->
  <rect x="540" y="300" width="20" height="60" fill="#4A6A8A"></rect>
  <rect x="570" y="280" width="20" height="80" fill="#4A6A8A"></rect>
  <rect x="600" y="260" width="20" height="100" fill="#4A6A8A"></rect>

  <!-- Banda título -->
  <rect x="140" y="380" width="520" height="100" fill="#0B2A4A"></rect>

  <!-- Texto principal -->
  <text x="400" y="430" font-family="serif" font-size="48" fill="white" text-anchor="middle" letter-spacing="2">
    EPIDEMIOLOGÍA
  </text>

  <!-- Subtítulo -->
  <text x="400" y="465" font-family="sans-serif" font-size="28" fill="#C8A2D8" text-anchor="middle" letter-spacing="4">
    NIVEL AVANZADO
  </text>

</svg>