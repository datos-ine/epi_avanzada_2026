## Botón de anterior/siguiente
page-navigation: true
  
## Botón de volver arriba
back-to-top-navigation: true

## Números de sección
number-sections: true
number-depth: 2

## Referencias
bibliography: references.bib

## Opciones de formato
format:
  html:
    # Tema claro y oscuro
    theme: 
     light: cosmo
     dark: cyborg
        
    # CSS
    css: styles.css
    
    grid:
      sidebar-width: 300px

    author-meta: "Christian Ballejo, Andrea Silva y Tamara Ricardo"

  epub:
    cover-image: logos/logo_curso.png

  typst: 
    toc: false
    include-in-header: typst-header.typ
    lang: es
    papersize: a4
    margin: 
      left: 2cm
      top: 2cm

# Tipografía
mainfont: "Calibri"

# Archivos para descargar
resources: 
  - files/
  
# Idioma del documento
lang: es

# Salida código de R
execute: 
  echo: true
  warning: false
  freeze: auto
  
# Metadatos
license: CC BY-NC

# Autores
author: 
  - name: Christian Ballejo
    orcid: 0000-0002-7346-5701
  - name: Andrea Silva
    orcid: 0000-0002-4791-9706
  - name: Tamara Ricardo
    orcid: 0000-0002-0921-2611  
