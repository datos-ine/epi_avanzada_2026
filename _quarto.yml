    # CSS
    css: styles.css
    
    # Tabla de contenidos
    toc: true
    toc-title: "Contenidos"    

  epub:
    cover-image: logos/logo_curso.png

  pdf: 
    documentclass: book
    papersize: a4
    geometry:
      - top=20mm
      - left=20mm

# Tipografía
mainfont: "Calibri"

# Archivos para descargar
resources: 
  - files/
  
# Idioma del documento
lang: es

# Salida código de R
execute: 
  echo: true
  warning: false
  freeze: auto
  
# Metadatos
license: CC BY-NC

# Autores
author: 
  - name: Christian Ballejo
    orcid: 0000-0002-7346-5701
  - name: Andrea Silva
    orcid: 0000-0002-4791-9706
  - name: Tamara Ricardo
    orcid: 0000-0002-0921-2611  
