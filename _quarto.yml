project:
  type: book  
  execute-dir: project

book:
  ## Metadatos
  title: "Epidemiología: Nivel Avanzado"
  author: "Instituto Nacional de Epidemiología Dr. Juan H. Jara"

  ## Configuración
  page-footer: 
    center: Este material fue creado en <a href="https://quarto.org/">Quarto</a> y forma parte del curso de Epidemiología - Nivel Avanzado © 2026 Instituto Nacional de Epidemiología "Dr. Juan H. Jara" (ANLIS)
  output-file: "epi_avanzada"
  cover-image: logos/logo_curso.png 
  downloads: [pdf, epub]

  ## Barra lateral
  sidebar: 
    style: docked
    logo: logos/logo_curso.png
    pinned: true
    tools: 
      - icon: r-circle-fill
        menu: 
          - text: R para Windows
            icon: windows
            target: _blank
            href: https://cran.rstudio.com/bin/windows/
          - text: R para macOS
            icon: apple
            target: _blank
            href: https://cran.rstudio.com/bin/macosx/
          - text: R para Linux
            icon: ubuntu
            target: _blank
            href: https://cran.rstudio.com/bin/linux/
          - text: RStudio Desktop
            icon: terminal
            target: _blank
            href: https://posit.co/download/rstudio-desktop/
          - text: RTools
            icon: terminal
            target: _blank
            href: https://cran.r-project.org/bin/windows/Rtools/
      - icon: file-zip
        menu: 
          - text: Paquetes para el curso
            icon: file-zip
            target: _blank
            href: files/paquetes_curso.zip
          - text: Datos de ejemplo
            icon: file-zip
            href: files/datos.zip
      
            
