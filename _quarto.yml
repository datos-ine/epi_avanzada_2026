## Botón de anterior/siguiente
page-navigation: true
  
## Botón de volver arriba
back-to-top-navigation: true

## Números de sección
number-sections: true
number-depth: 2

## Opciones de formato
format:
  html:
    # Tema claro y oscuro
    theme: 
     light: cosmo
     dark: cyborg
     
